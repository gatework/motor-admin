<% database_type = ENV.fetch('DATABASE_TYPE', 'sqlite') %>
<% if database_type == 'mysql' %>
common: &common
  adapter: mysql2
  encoding: utf8mb4
  username: root
  password:
  host: 127.0.0.1
  port: 3306
<% elsif %w[postgres postgresql].include?(database_type) %>
common: &common
  adapter: postgresql
  encoding: unicode
  pool: 10
  timeout: 5000
  min_messages: warning
  username: postgres
  password: postgres
  host: localhost
<% else %>
common: &common
  adapter: sqlite3
  timeout: 30000
<% end %>

development:
  <<: *common
<% if database_type == 'mysql' %>
  database: motor_edge_dev
<% elsif %w[postgres postgresql].include?(database_type) %>
  database: motor_edge_dev
<% else %>
  database: db/development.sqlite3
<% end %>

test:
  <<: *common
<% if database_type == 'mysql' %>
  database: motor_edge_test
<% elsif %w[postgres postgresql].include?(database_type) %>
  database: motor_edge_test
<% else %>
  database: db/test.sqlite3
<% end %>

production:
<% if ENV['DATABASE_URL'].to_s.empty? %>
  adapter: sqlite3
  timeout: 30000
  database: <%= ENV['WORKDIR'] %>motor-admin.sqlite3
<% else %>
  adapter: postgresql
  pool: 10
  url: <%= ENV['DATABASE_URL'] %>
<% end %>
