name: Build Docker Images

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Checkout submodules
        env:
          MOTOR_ADMIN_PRO_DEPLOY_KEY: ${{ secrets.MOTOR_ADMIN_PRO_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$MOTOR_ADMIN_PRO_DEPLOY_KEY" ]; then
            echo "::error::MOTOR_ADMIN_PRO_DEPLOY_KEY is required to checkout vendor/motor-admin-pro"
            exit 1
          fi

          install -m 700 -d ~/.ssh
          printf '%s\n' "$MOTOR_ADMIN_PRO_DEPLOY_KEY" > ~/.ssh/motor-admin-pro
          chmod 600 ~/.ssh/motor-admin-pro
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git config --global core.sshCommand "ssh -i ~/.ssh/motor-admin-pro -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
          git config --global url."git@github.com:gatework/motor-admin-pro.git".insteadOf "https://github.com/gatework/motor-admin-pro.git"
          git submodule sync --recursive
          git submodule update --init --force --depth=1 --recursive

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            gatework/motoradmin
          tags: |
            type=semver,pattern={{version}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=motoradmin
          cache-to: type=gha,mode=max,scope=motoradmin
