name: Rubocop

on: [push]

permissions:
  contents: read

jobs:
  rubocop:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install required package
        run: |
          sudo apt-get update
          sudo apt-get -y install libpq-dev freetds-dev

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.5
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop
